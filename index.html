<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firmansyah Azhari | CV Website</title>
  <style>
    :root {
      --navy: #2f3a4e;
      --navy-dark: #263143;
      --navy-soft: #44536b;
      --paper: #ffffff;
      --bg: #f4f6fa;
      --text: #1f2937;
      --muted: #596579;
      --line: #d8dee8;
      --accent: #5f738f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .cv-page {
      max-width: 1140px;
      margin: 32px auto;
      background: var(--paper);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .top {
      display: grid;
      grid-template-columns: 400px 1fr;
      min-height: 310px;
      background: var(--paper);
    }

    .photo-block {
      background: var(--navy);
      border-bottom-right-radius: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px;
    }

    .photo-wrap {
      width: 205px;
      height: 205px;
      border-radius: 50%;
      border: 8px solid rgba(255,255,255,0.18);
      overflow: hidden;
      background: var(--navy-soft);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identity {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 46px 64px;
    }

    .identity h1 {
      font-size: clamp(42px, 6vw, 70px);
      line-height: 1.05;
      letter-spacing: 8px;
      color: var(--navy);
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .identity .role {
      color: var(--navy);
      font-size: 26px;
      letter-spacing: 9px;
      text-transform: uppercase;
    }

    .contact-bar {
      margin: 28px 32px 34px;
      background: var(--navy);
      color: #fff;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-items: center;
      padding: 20px 52px;
      font-size: 16px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .contact-item svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      opacity: 0.9;
    }

    .layout {
      display: grid;
      grid-template-columns: 400px 1fr;
    }

    .sidebar {
      background: var(--navy);
      color: #fff;
      border-top-right-radius: 70px;
      padding: 72px 44px 64px;
      min-height: 1000px;
    }

    .main {
      padding: 70px 64px 70px;
    }

    .section {
      margin-bottom: 34px;
    }

    .section-title {
      font-size: 30px;
      letter-spacing: 8px;
      line-height: 1;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid currentColor;
      color: inherit;
    }

    .sidebar .section-title {
      color: #fff;
      border-color: rgba(255,255,255,0.75);
    }

    .main .section-title {
      color: var(--navy);
      border-color: var(--navy);
    }

    .edu-item {
      margin-bottom: 30px;
    }

    .edu-item h3 {
      font-size: 21px;
      line-height: 1.25;
      margin-bottom: 8px;
      color: #fff;
    }

    .edu-item p,
    .skill-list li,
    .language-list li {
      color: rgba(255,255,255,0.88);
      font-size: 18px;
    }

    .skill-list,
    .language-list {
      list-style: none;
      display: grid;
      gap: 7px;
    }

    .about-text {
      font-size: 17px;
      text-align: justify;
      color: #111827;
    }

    .experience-item {
      margin-bottom: 28px;
    }

    .job-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 8px;
    }

    .job-title {
      font-size: 25px;
      font-weight: 800;
      color: #111827;
      line-height: 1.25;
    }

    .period {
      font-size: 17px;
      color: #111827;
      white-space: nowrap;
      padding-top: 3px;
    }

    .company {
      font-size: 18px;
      color: #111827;
      margin-bottom: 12px;
    }

    .description {
      font-size: 17px;
      color: #111827;
      text-align: justify;
    }

    .floating-actions {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      background: var(--navy);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
    }

    .btn.secondary {
      background: #fff;
      color: var(--navy);
      border: 1px solid var(--line);
    }

    .template-note {
      max-width: 1140px;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .cv-page {
        margin: 0;
      }

      .top,
      .layout {
        grid-template-columns: 1fr;
      }

      .photo-block,
      .sidebar {
        border-radius: 0;
      }

      .identity {
        padding: 34px 28px;
        text-align: center;
      }

      .identity h1 {
        letter-spacing: 4px;
      }

      .identity .role {
        font-size: 20px;
        letter-spacing: 5px;
      }

      .contact-bar {
        grid-template-columns: 1fr;
        border-radius: 22px;
        padding: 22px;
      }

      .sidebar,
      .main {
        padding: 42px 28px;
        min-height: unset;
      }

      .section-title {
        font-size: 25px;
        letter-spacing: 5px;
      }

      .job-head {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .period {
        white-space: normal;
      }

      .floating-actions {
        position: static;
        justify-content: center;
        margin: 24px 0;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .cv-page {
        margin: 0;
        box-shadow: none;
      }

      .floating-actions,
      .template-note {
        display: none;
      }
    }
  </style>
</head>

          <div class="contact-item">${icons.email}<span>${data.email}</span></div>
          <a class="contact-item" href="${data.website}" target="_blank" rel="noopener">${icons.web}<span>${data.website}</span></a>
        </section>

        <section class="layout">
          <aside class="sidebar">
            <section class="section">
              <h2 class="section-title">Education</h2>
              ${data.education.map(item => `
                <div class="edu-item">
                  <h3>${item.title}</h3>
                  <p>${item.school}</p>
                  <p>${item.year}</p>
                </div>
              `).join("")}
            </section>

            <section class="section">
              <h2 class="section-title">Skills</h2>
              <ul class="skill-list">
                ${data.skills.map(skill => `<li>${skill}</li>`).join("")}
              </ul>
            </section>

            <section class="section">
              <h2 class="section-title">Language</h2>
              <ul class="language-list">
                ${data.languages.map(language => `<li>${language}</li>`).join("")}
              </ul>
            </section>
          </aside>

          <main class="main">
            <section class="section">
              <h2 class="section-title">About me</h2>
              <p class="about-text">${data.about}</p>
            </section>

            <section class="section">
              <h2 class="section-title">Experience</h2>
              ${data.experience.map(job => `
                <article class="experience-item">
                  <div class="job-head">
                    <h3 class="job-title">${job.title}</h3>
                    <div class="period">${job.period}</div>
                  </div>
                  <div class="company">${job.company}</div>
                  <p class="description">${job.description}</p>
                </article>
              `).join("")}
            </section>
          </main>
        </section>
      `;
    }

    renderCV(CV_DATA);
  </script>
</body>
</html>
